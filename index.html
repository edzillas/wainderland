<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wainderland</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'Botw';
    src: url('twboz.otf') format('opentype');
    font-weight: normal; font-style: normal; font-display: swap;
  }

  :root {
    --dest:   "https://links.krea.ai/wainderland";
    --void:   #07090c;
    --gold:   #f0c24b;
    --gold-hi:#ffe9a8;
    --red:     #7c1518;
    --red-hi:  #b8342c;
    --ink:     #1a0d05;
    --fog:     #8a94a2;
    --card:    rgba(255,255,255,0.04);
    --card-br: rgba(240,194,75,0.16);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    background: var(--void);
    color: var(--gold);
    font-family: 'Cinzel', serif;
    min-height: 100dvh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 8vh 24px 6vh;
    position: relative;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: "";
    position: fixed; inset: 0;
    background:
      radial-gradient(70% 45% at 50% 20%, rgba(40,70,55,0.32), transparent 70%),
      radial-gradient(40% 30% at 88% 8%, rgba(180,90,30,0.16), transparent 70%),
      radial-gradient(100% 60% at 50% 120%, rgba(0,0,0,0.75), transparent 70%);
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: "";
    position: fixed; inset: 0;
    background-image: repeating-linear-gradient(
      to bottom, rgba(0,0,0,0) 0, rgba(0,0,0,0) 2px,
      rgba(0,0,0,0.13) 3px, rgba(0,0,0,0) 4px);
    mix-blend-mode: multiply;
    pointer-events: none; z-index: 3; opacity: 0.55;
  }

  .wrap {
    position: relative; z-index: 2;
    width: 100%; max-width: 420px;
    text-align: center;
    display: flex; flex-direction: column;
    align-items: center; gap: 26px;
  }

  /* wordmark — gold face, red 3D extrusion */
  h1 {
    font-family: 'Botw', 'Cinzel', serif;
    font-weight: 900;
    font-size: clamp(40px, 12vw, 62px);
    line-height: 0.95;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    color: var(--gold);
    -webkit-text-stroke: 1.4px var(--ink);
    paint-order: stroke fill;
    text-shadow:
      1px 1px 0 var(--red), 2px 2px 0 var(--red), 3px 3px 0 var(--red),
      4px 4px 0 #6a1215, 5px 5px 0 var(--ink),
      6px 7px 11px rgba(0,0,0,0.85), 0 0 28px rgba(240,194,75,0.12);
    background: linear-gradient(180deg, var(--gold-hi) 0%, var(--gold) 48%, #cf9a34 100%);
    -webkit-background-clip: text; background-clip: text;
    margin-bottom: 2px;
  }

  /* KREA — the main event */
  .krea {
    display: flex; flex-direction: column; align-items: center;
    gap: 9px; width: 100%;
  }
  .krea-btn {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 3px;
    text-decoration: none; cursor: pointer;
    color: var(--gold-hi);
    width: 100%;
    background: linear-gradient(180deg, #7c1518 0%, #5a0f12 100%);
    border: 1px solid rgba(240,194,75,0.4);
    border-radius: 4px;
    padding: 17px 26px;
    box-shadow:
      inset 0 1px 0 rgba(255,220,150,0.18),
      0 6px 22px rgba(124,21,24,0.35),
      0 6px 22px rgba(0,0,0,0.4);
    transition: transform 0.12s ease, box-shadow 0.2s ease, filter 0.2s ease;
  }
  .krea-btn .main {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 12px;
    font-family: 'Botw', 'Cinzel', serif;
    font-weight: 900;
    font-size: clamp(18px, 5vw, 22px);
    letter-spacing: 0.05em; text-transform: uppercase;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.5), 0 1px 6px rgba(0,0,0,0.6);
  }
  .krea-btn .url {
    display: inline-flex; align-items: center; gap: 5px;
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    font-size: 11px; font-weight: 500; letter-spacing: 0.08em;
    text-transform: lowercase;
    color: rgba(240,194,75,0.65);
  }
  .krea-btn .url svg { width: 12px; height: 12px; flex: none; }
  .krea-btn:active { transform: translateY(2px); }
  .krea-btn:hover { filter: brightness(1.12); border-color: rgba(240,194,75,0.7); }
  .krea-btn svg { width: 17px; height: 17px; flex: none; }

  /* locked state inside TikTok — looks disabled, click only nudges */
  .krea-btn.locked {
    background: linear-gradient(180deg, #3a2b2c 0%, #2b2122 100%);
    border-color: rgba(240,194,75,0.22);
    filter: grayscale(0.5);
  }
  .krea-btn.locked .main { color: rgba(240,233,168,0.55); }
  .krea-btn.locked .url { color: rgba(240,194,75,0.4); }
  .krea-btn.locked:hover { filter: grayscale(0.5); border-color: rgba(240,194,75,0.22); }

  .krea-sub {
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    font-size: 12px; font-weight: 400; letter-spacing: 0.02em;
    color: var(--fog); line-height: 1.5;
    text-transform: none;
  }
  .krea-sub .disc { color: rgba(138,148,162,0.6); }
  .krea-sub .howto {
    display: block;
    margin-top: 7px;
    color: var(--gold);
    font-weight: 600;
    opacity: 0.85;
  }

  /* divider */
  .div {
    display: flex; align-items: center; gap: 12px;
    width: 100%; margin: 2px 0;
  }
  .div span {
    height: 1px; flex: 1;
    background: linear-gradient(90deg, transparent, rgba(240,194,75,0.25), transparent);
  }
  .div b {
    font-family: system-ui, sans-serif;
    font-size: 10px; font-weight: 600; letter-spacing: 0.22em;
    text-transform: uppercase; color: rgba(138,148,162,0.55);
  }

  /* social links */
  .socials { display: flex; flex-direction: column; gap: 11px; width: 100%; }
  .social {
    display: flex; align-items: center; gap: 15px;
    text-decoration: none;
    background: var(--card);
    border: 1px solid var(--card-br);
    border-radius: 4px;
    padding: 14px 18px;
    transition: background 0.18s ease, border-color 0.18s ease, transform 0.1s ease;
  }
  .social:active { transform: translateY(1px); }
  .social:hover { background: rgba(240,194,75,0.07); border-color: rgba(240,194,75,0.35); }
  .social svg { width: 22px; height: 22px; flex: none; color: var(--gold); }
  .social span {
    font-family: 'Cinzel', serif;
    font-weight: 700; font-size: 15px; letter-spacing: 0.03em;
    color: var(--gold-hi); text-transform: uppercase;
  }
  .social .at {
    margin-left: auto;
    font-family: system-ui, sans-serif;
    font-size: 12px; font-weight: 400; letter-spacing: 0;
    color: var(--fog); text-transform: none;
  }

  .foot {
    font-family: system-ui, sans-serif;
    font-size: 11px; color: rgba(138,148,162,0.4);
    margin-top: 6px; letter-spacing: 0.02em;
  }

  /* passing state (real browser going straight to Krea) */
  .passing .wrap > *:not(.passmsg) { display: none; }
  .passmsg { display: none; }
  .passing .passmsg {
    display: block; margin-top: 30vh;
    font-family: 'Botw', 'Cinzel', serif;
    color: var(--gold); font-weight: 900;
    letter-spacing: 0.14em; text-transform: uppercase; font-size: 15px;
    -webkit-text-stroke: 1px var(--ink); paint-order: stroke fill;
    text-shadow: 1px 1px 0 var(--red), 2px 2px 0 var(--ink);
    animation: pulse 1.1s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.45;} 50%{opacity:1;} }
</style>
</head>
<body>
  <div class="wrap">
    <h1>Wainderland</h1>

    <div class="krea">
      <a class="krea-btn" id="gate" href="#" rel="noopener">
        <span class="main">Try Krea</span>
        <span class="url">krea.ai
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M7 17 L17 7"/><path d="M9 7 h8 v8"/>
          </svg>
        </span>
      </a>
      <p class="krea-sub" id="sub">The AI studio I use for all my content. <span class="disc">Affiliate link.</span></p>
    </div>

    <div class="div"><span></span><b>elsewhere</b><span></span></div>

    <div class="socials">
      <a class="social" href="https://www.instagram.com/wainderland" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
        </svg>
        <span>Instagram</span><span class="at">@wainderland</span>
      </a>
      <a class="social" href="https://www.tiktok.com/@wainderland" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor" stroke="none">
          <path d="M16.5 3c.3 2.1 1.6 3.7 3.7 4v2.6c-1.4.1-2.7-.3-3.9-1v6.1c0 3.4-2.6 5.9-5.9 5.9-2.9 0-5.3-2-5.3-5 0-3.1 2.6-5.1 5.6-4.7v2.7c-.4-.1-.9-.2-1.3-.2-1.3 0-2.3 1-2.3 2.3 0 1.4 1.1 2.3 2.4 2.3 1.5 0 2.6-1.1 2.6-2.9V3h1.9z"/>
        </svg>
        <span>TikTok</span><span class="at">@wainderland</span>
      </a>
      <a class="social" href="https://youtube.com/@wainderland" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="5" width="20" height="14" rx="4"/><path d="M10 9 l5 3 -5 3 z" fill="currentColor" stroke="none"/>
        </svg>
        <span>YouTube</span><span class="at">@wainderland</span>
      </a>
      <a class="social" href="https://www.facebook.com/share/1DmgZppTeS/" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor" stroke="none">
          <path d="M14 9h2.5l.5-3h-3V4.2c0-.9.3-1.5 1.6-1.5H17V.1C16.7.1 15.6 0 14.4 0 11.9 0 10.2 1.5 10.2 4.3V6H7.5v3h2.7v9H14V9z"/>
        </svg>
        <span>Facebook</span><span class="at">wainderland</span>
      </a>
      <a class="social" href="mailto:wainderland@gmail.com">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="3"/><path d="M3 6 l9 7 9 -7"/>
        </svg>
        <span>Mail</span><span class="at">business</span>
      </a>
    </div>

    <p class="foot">wainderland.com</p>
  </div>

  <p class="passmsg">Entering…</p>

<script>
(function () {
  var DEST = getComputedStyle(document.documentElement)
    .getPropertyValue('--dest').trim().replace(/^["']|["']$/g, '');

  var ua = navigator.userAgent || navigator.vendor || '';
  var isInstagram = /Instagram/i.test(ua);
  var isFacebook  = /FBAN|FBAV|FB_IAB/i.test(ua);
  var isTikTok    = /BytedanceWebview|musical_ly|Bytedance|TikTok|trill/i.test(ua);
  var isInApp     = isInstagram || isFacebook || isTikTok;
  var isAndroid   = /Android/i.test(ua);
  var isIOS       = /iPhone|iPad|iPod/i.test(ua);

  var gate = document.getElementById('gate');
  var sub  = document.getElementById('sub');

  // Android Chrome intent. Instagram/FB honor this; TikTok blocks it
  // and throws "Action can't be completed", so TikTok is excluded.
  function chromeIntent() {
    var noScheme = DEST.replace(/^https?:\/\//, '');
    return 'intent://' + noScheme +
      '#Intent;scheme=https;package=com.android.chrome;' +
      'S.browser_fallback_url=' + encodeURIComponent(DEST) + ';end';
  }

  var useIntent = isAndroid && (isInstagram || isFacebook); // NOT TikTok

  // In TikTok we do NOT let the button reach Krea (it would open inside
  // TikTok's webview where nobody is logged in). Lock it to a nudge instead.
  var lockInTikTok = isTikTok;

  // Set the href: intent where it works; '#' in TikTok; plain URL otherwise.
  gate.href = useIntent ? chromeIntent() : (lockInTikTok ? '#' : DEST);

  if (isInApp) {
    if (isTikTok) {
      gate.classList.add('locked');
      sub.innerHTML = 'The AI studio I use for all my content. <span class="disc">Affiliate link.</span>' +
        '<span class="howto">Tap \u22ef top-right, then \u201cOpen in browser\u201d to continue</span>';
    } else if (isIOS) {
      sub.innerHTML = 'The AI studio I use for all my content. <span class="disc">Affiliate link.</span>' +
        '<span class="howto">Tap \u22ef at the top, then \u201cOpen in browser\u201d</span>';
    } else if (isAndroid) {
      sub.innerHTML = 'The AI studio I use for all my content. <span class="disc">Affiliate link.</span>';
    }

    gate.addEventListener('click', function (e) {
      if (useIntent) return; // Android IG/FB: intent fires natively
      e.preventDefault();
      if (lockInTikTok) {
        // Don't go to Krea inside TikTok. Flash the instruction instead.
        var howto = sub.querySelector('.howto');
        if (howto) {
          howto.style.transition = 'none';
          howto.style.color = '#ffe9a8';
          howto.style.opacity = '1';
          howto.style.transform = 'scale(1.04)';
          setTimeout(function () {
            howto.style.transition = 'all 0.5s ease';
            howto.style.color = '';
            howto.style.transform = 'scale(1)';
          }, 60);
        }
        return;
      }
      window.location.href = DEST;
    });
  }
})();
</script>
</body>
</html>
