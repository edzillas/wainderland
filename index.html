<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wainderland</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     wainderland gate  —  destination link set here:
     ============================================================ */
  :root {
    --dest: "https://links.krea.ai/wainderland";

    --void:   #07090c;
    --gold:   #f0c24b;
    --gold-hi:#ffe9a8;
    --red:     #7c1518;
    --red-hi:  #b8342c;
    --ink:     #1a0d05;
    --fog:     #8a94a2;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    background: var(--void);
    color: var(--gold);
    font-family: 'Cinzel', serif;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 7vh 26px;
    position: relative;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* dim cavern glow, cold green + torch warmth bleeding in from edges */
  body::before {
    content: "";
    position: fixed; inset: 0;
    background:
      radial-gradient(70% 50% at 50% 38%, rgba(40,70,55,0.35), transparent 70%),
      radial-gradient(40% 30% at 85% 12%, rgba(180,90,30,0.18), transparent 70%),
      radial-gradient(90% 70% at 50% 120%, rgba(0,0,0,0.7), transparent 70%);
    pointer-events: none; z-index: 0;
  }
  /* faint VHS scanlines */
  body::after {
    content: "";
    position: fixed; inset: 0;
    background-image: repeating-linear-gradient(
      to bottom, rgba(0,0,0,0) 0, rgba(0,0,0,0) 2px,
      rgba(0,0,0,0.14) 3px, rgba(0,0,0,0) 4px);
    mix-blend-mode: multiply;
    pointer-events: none; z-index: 3; opacity: 0.6;
  }

  .wrap {
    position: relative; z-index: 2;
    width: 100%; max-width: 460px;
    text-align: center;
    display: flex; flex-direction: column;
    align-items: center; gap: 34px;
  }

  /* the wainderland wordmark — gold fill, dark red stroke, that BOTW-poster look */
  h1 {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: clamp(40px, 12vw, 68px);
    line-height: 0.95;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    color: var(--gold);
    -webkit-text-stroke: 2px var(--ink);
    paint-order: stroke fill;
    text-shadow:
      0 2px 0 var(--red),
      0 3px 0 var(--ink),
      0 5px 10px rgba(0,0,0,0.8),
      0 0 22px rgba(240,194,75,0.25);
    background: linear-gradient(180deg, var(--gold-hi) 0%, var(--gold) 42%, #c9922f 100%);
    -webkit-background-clip: text;
    background-clip: text;
  }

  .tag {
    font-size: clamp(15px, 4vw, 19px);
    font-weight: 700;
    letter-spacing: 0.02em;
    color: var(--gold);
    text-transform: uppercase;
    -webkit-text-stroke: 1px var(--ink);
    paint-order: stroke fill;
    text-shadow: 0 2px 0 var(--red), 0 3px 6px rgba(0,0,0,0.7);
    max-width: 22ch;
    line-height: 1.3;
  }

  .gate {
    display: inline-flex;
    align-items: center; justify-content: center;
    gap: 12px;
    text-decoration: none; cursor: pointer;
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: clamp(18px, 5vw, 22px);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--gold-hi);
    background:
      linear-gradient(180deg, var(--red-hi) 0%, var(--red) 55%, #4d0d0f 100%);
    border: 2px solid var(--ink);
    padding: 18px 30px;
    width: 100%; max-width: 340px;
    -webkit-text-stroke: 1px rgba(26,13,5,0.6);
    paint-order: stroke fill;
    text-shadow: 0 2px 3px rgba(0,0,0,0.8);
    box-shadow:
      inset 0 1px 0 rgba(255,220,150,0.25),
      0 4px 0 #2a0708,
      0 8px 16px rgba(0,0,0,0.6);
    transition: transform 0.1s ease, box-shadow 0.1s ease, filter 0.2s ease;
  }
  .gate:active {
    transform: translateY(3px);
    box-shadow:
      inset 0 1px 0 rgba(255,220,150,0.2),
      0 1px 0 #2a0708,
      0 3px 8px rgba(0,0,0,0.6);
  }
  .gate:hover { filter: brightness(1.08); }
  .gate svg { width: 18px; height: 18px; flex: none; }

  .hint {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: var(--fog);
    line-height: 1.7;
    max-width: 30ch;
    text-transform: none;
  }
  .hint b { color: var(--gold); font-weight: 700; }

  /* passing-through state (real browser) */
  .passing .wrap > *:not(.passmsg) { display: none; }
  .passmsg { display: none; }
  .passing .passmsg {
    display: block;
    color: var(--gold);
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-size: 14px;
    -webkit-text-stroke: 1px var(--ink);
    paint-order: stroke fill;
    text-shadow: 0 2px 0 var(--red);
    animation: pulse 1.1s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.45;} 50%{opacity:1;} }
</style>
</head>
<body>
  <div class="wrap">
    <h1>Wainderland</h1>
    <p class="tag">The link ahead won't open in here</p>

    <a class="gate" id="gate" href="#" rel="noopener">
      Open in browser
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M7 17 L17 7"/><path d="M9 7 h8 v8"/>
      </svg>
    </a>

    <p class="hint" id="hint">Tap it to jump out into your real browser.</p>
    <p class="passmsg">Entering…</p>
  </div>

<script>
(function () {
  var DEST = getComputedStyle(document.documentElement)
    .getPropertyValue('--dest').trim().replace(/^["']|["']$/g, '');

  var ua = navigator.userAgent || navigator.vendor || '';
  var isInstagram = /Instagram/i.test(ua);
  var isFacebook  = /FBAN|FBAV|FB_IAB/i.test(ua);
  var isInApp     = isInstagram || isFacebook;
  var isAndroid   = /Android/i.test(ua);
  var isIOS       = /iPhone|iPad|iPod/i.test(ua);

  var gate = document.getElementById('gate');
  var hint = document.getElementById('hint');

  function escapeUrl() {
    if (isAndroid) {
      var noScheme = DEST.replace(/^https?:\/\//, '');
      return 'intent://' + noScheme +
        '#Intent;scheme=https;package=com.android.chrome;' +
        'S.browser_fallback_url=' + encodeURIComponent(DEST) + ';end';
    }
    return DEST;
  }

  if (!isInApp) {
    document.body.classList.add('passing');
    gate.href = DEST;
    window.location.replace(DEST);
    return;
  }

  gate.href = escapeUrl();

  if (isAndroid) {
    hint.innerHTML = 'If nothing happens, tap <b>⋮</b> above and choose <b>Open in Chrome</b>.';
    var jumped = false;
    function jump() { if (jumped) return; jumped = true; window.location.href = escapeUrl(); }
    setTimeout(jump, 400);
  } else if (isIOS) {
    hint.innerHTML = 'Tap <b>⋯</b> at the top right, then <b>Open in external browser</b>.';
  }

  gate.addEventListener('click', function (e) {
    if (isAndroid) return;
    e.preventDefault();
    window.location.href = DEST;
  });
})();
</script>
</body>
</html>
