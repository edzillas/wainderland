<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAINDERLAND</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Grenze+Gotisch:wght@400;600;800&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     WAINDERLAND redirect gate
     Set your destination link here:
     ============================================================ */

  :root {
    --dest: "https://links.krea.ai/wainderland";

    --void: #05060a;
    --ash:  #0b0f16;
    --bone: #d8d2c4;
    --fog:  #7c8798;
    --cyan: #4fd6e0;
    --cyan-deep: #12333a;
    --blood: #b2243a;
    --steel: #1a2230;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    background: var(--void);
    color: var(--bone);
    font-family: 'Grenze Gotisch', serif;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6vh 24px;
    overflow: hidden;
    position: relative;
    -webkit-font-smoothing: antialiased;
  }

  /* cold moonlight bleed + bioluminescent haze */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(120% 80% at 50% -10%, rgba(79,214,224,0.14), transparent 60%),
      radial-gradient(90% 60% at 50% 120%, rgba(18,51,58,0.55), transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* VHS scanlines + grain */
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(
        to bottom,
        rgba(0,0,0,0) 0px,
        rgba(0,0,0,0) 2px,
        rgba(0,0,0,0.16) 3px,
        rgba(0,0,0,0) 4px
      );
    mix-blend-mode: multiply;
    pointer-events: none;
    z-index: 3;
    opacity: 0.7;
    animation: rollbar 8s linear infinite;
  }

  @keyframes rollbar {
    0%   { background-position-y: 0; }
    100% { background-position-y: 100px; }
  }

  .frame {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 440px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 30px;
  }

  .sigil {
    width: 78px;
    height: 78px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    filter: drop-shadow(0 0 14px rgba(79,214,224,0.5));
  }

  .sigil svg { width: 100%; height: 100%; }

  .eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--fog);
    padding-left: 0.42em;
  }

  h1 {
    font-family: 'Pirata One', serif;
    font-weight: 400;
    font-size: clamp(52px, 16vw, 82px);
    line-height: 0.9;
    letter-spacing: 0.01em;
    color: var(--bone);
    text-shadow:
      0 0 1px rgba(79,214,224,0.9),
      2px 0 0 rgba(178,36,58,0.35),
      -2px 0 0 rgba(79,214,224,0.35);
    animation: chroma 6s steps(30) infinite;
  }

  @keyframes chroma {
    0%, 92%, 100% { transform: translateX(0); }
    93% { transform: translateX(-1.5px); }
    95% { transform: translateX(1.5px); }
    97% { transform: translateX(-0.5px); }
  }

  .rule {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    opacity: 0.6;
  }

  p.lede {
    font-size: 20px;
    font-weight: 400;
    line-height: 1.45;
    color: var(--fog);
    max-width: 34ch;
  }

  p.lede strong { color: var(--bone); font-weight: 600; }

  .gate {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    text-decoration: none;
    cursor: pointer;
    font-family: 'Grenze Gotisch', serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--void);
    background: var(--bone);
    border: none;
    padding: 20px 34px;
    width: 100%;
    max-width: 360px;
    position: relative;
    clip-path: polygon(6px 0, 100% 0, calc(100% - 6px) 100%, 0 100%);
    box-shadow: 0 0 24px rgba(79,214,224,0.28);
    transition: transform 0.12s ease, box-shadow 0.2s ease, background 0.2s ease;
  }

  .gate:hover, .gate:active {
    background: var(--cyan);
    box-shadow: 0 0 40px rgba(79,214,224,0.6);
    transform: translateY(-1px);
  }

  .gate svg { width: 20px; height: 20px; flex: none; }

  .hint {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    color: var(--fog);
    opacity: 0.65;
    line-height: 1.7;
    max-width: 30ch;
  }

  .hint b { color: var(--cyan); font-weight: 400; }

  /* redirecting state (native browser, straight through) */
  .passing .frame > *:not(.sigil):not(.passing-msg) { display: none; }
  .passing-msg { display: none; }
  .passing .passing-msg {
    display: block;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--cyan);
    animation: pulse 1.2s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100%{opacity:0.4;} 50%{opacity:1;} }

  @media (prefers-reduced-motion: reduce) {
    body::after, h1, .passing-msg { animation: none; }
  }
</style>
</head>
<body>
  <div class="frame">

    <div class="sigil" aria-hidden="true">
      <svg viewBox="0 0 100 100" fill="none">
        <path d="M50 6 L60 30 L86 34 L66 52 L72 82 L50 66 L28 82 L34 52 L14 34 L40 30 Z"
              stroke="#4fd6e0" stroke-width="2.5" stroke-linejoin="round"/>
        <circle cx="50" cy="48" r="9" stroke="#d8d2c4" stroke-width="2"/>
        <circle cx="50" cy="48" r="2.5" fill="#4fd6e0"/>
      </svg>
    </div>

    <div class="eyebrow">Enter the realm</div>

    <h1>WAINDERLAND</h1>

    <div class="rule"></div>

    <p class="lede">The gate ahead does not open inside this window.<br><strong>Step out into your real browser to pass through.</strong></p>

    <a class="gate" id="gate" href="#" rel="noopener">
      Open the gate
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M7 17 L17 7"/><path d="M9 7 h8 v8"/>
      </svg>
    </a>

    <div class="hint" id="hint">
      If nothing happens, tap the <b>⋯</b> menu above and choose <b>Open in browser</b>.
    </div>

    <div class="passing-msg">Opening the gate…</div>
  </div>

<script>
(function () {
  // Destination pulled from the CSS var so there's one place to edit.
  var DEST = getComputedStyle(document.documentElement)
    .getPropertyValue('--dest').trim().replace(/^["']|["']$/g, '');

  var ua = navigator.userAgent || navigator.vendor || '';
  var isInstagram = /Instagram/i.test(ua);
  var isFacebook  = /FBAN|FBAV|FB_IAB/i.test(ua);
  var isInApp     = isInstagram || isFacebook;
  var isAndroid   = /Android/i.test(ua);
  var isIOS       = /iPhone|iPad|iPod/i.test(ua);

  var gate = document.getElementById('gate');
  var hint = document.getElementById('hint');

  // Build the escape URL for the in-app webview.
  function escapeUrl() {
    if (isAndroid) {
      // Android intent: hand the URL to Chrome directly.
      var noScheme = DEST.replace(/^https?:\/\//, '');
      return 'intent://' + noScheme +
        '#Intent;scheme=https;package=com.android.chrome;' +
        'S.browser_fallback_url=' + encodeURIComponent(DEST) + ';end';
    }
    // iOS + everything else: best we can do is point straight at the
    // destination; the button + the ⋯ menu hint carry the escape.
    return DEST;
  }

  if (!isInApp) {
    // Real browser already — pass straight through, no gate needed.
    document.body.classList.add('passing');
    gate.href = DEST;
    window.location.replace(DEST);
    return;
  }

  // Inside Instagram/Facebook webview: arm the gate.
  gate.href = escapeUrl();

  if (isAndroid) {
    hint.innerHTML = 'If the gate stays shut, tap <b>⋮</b> above and choose <b>Open in Chrome</b>.';

    // Android: auto-fire the intent on load so the user lands in Chrome
    // without tapping. The button stays as a manual fallback.
    var jumped = false;
    function jumpToChrome() {
      if (jumped) return;
      jumped = true;
      window.location.href = escapeUrl();
    }
    // Small delay lets the page paint first, then hand off to Chrome.
    setTimeout(jumpToChrome, 400);

  } else if (isIOS) {
    hint.innerHTML = 'Tap <b>⋯</b> at the top right, then <b>Open in external browser</b>.';
  }

  gate.addEventListener('click', function (e) {
    if (isAndroid) {
      // Let the intent:// href fire natively.
      return;
    }
    // iOS: attempt the jump; the hint covers the fallback.
    e.preventDefault();
    window.location.href = DEST;
  });
})();
</script>
</body>
</html>
